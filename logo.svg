<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Toxiproxy">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#222a3b"/>
      <stop offset="1" stop-color="#161c29"/>
    </linearGradient>
    <linearGradient id="toxic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9be80c"/>
      <stop offset="1" stop-color="#39d353"/>
    </linearGradient>
  </defs>

  <!-- rounded tile -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bg)"/>

  <!-- client + server nodes -->
  <circle cx="132" cy="256" r="58" fill="none" stroke="#5b6b8c" stroke-width="20"/>
  <circle cx="380" cy="256" r="58" fill="none" stroke="#5b6b8c" stroke-width="20"/>

  <!-- proxied link, severed by a toxic fault bolt -->
  <path d="M190 256 H222" stroke="#5b6b8c" stroke-width="20" stroke-linecap="round"/>
  <path d="M290 256 H322" stroke="#5b6b8c" stroke-width="20" stroke-linecap="round"/>
  <path d="M262 150 L214 262 L256 262 L250 362 L312 236 L266 236 Z"
        fill="url(#toxic)" stroke="#161c29" stroke-width="10" stroke-linejoin="round"/>
</svg>
