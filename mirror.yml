name: toxiproxy
target:
  registry: ocx.sh
  repository: toxiproxy

source:
  type: github_release
  owner: Shopify
  repo: toxiproxy
  # Tags: v2.12.0, v2.11.0, … Three fixed digits, leading v.
  tag_pattern: "^v(?P<version>\\d+\\.\\d+\\.\\d+)$"

# Three build flavors from one upstream release:
#   default (unnamed) -> full archive: ships BOTH toxiproxy-server + toxiproxy-cli
#                        -> bare cascade tags (2.12.0, 2.12, 2, latest)
#   client            -> raw toxiproxy-cli binary only  -> client-prefixed tags
#   server            -> raw toxiproxy-server binary only -> server-prefixed tags
# Upstream ships Go static binaries only (no musl/glibc split) and no
# windows/arm64 asset, so each variant covers the same five platforms.
variants:
  - default: true
    assets:
      linux/amd64:
        - "^toxiproxy_.*_linux_amd64\\.tar\\.gz$"
      linux/arm64:
        - "^toxiproxy_.*_linux_arm64\\.tar\\.gz$"
      darwin/amd64:
        - "^toxiproxy_.*_darwin_amd64\\.tar\\.gz$"
      darwin/arm64:
        - "^toxiproxy_.*_darwin_arm64\\.tar\\.gz$"
      windows/amd64:
        - "^toxiproxy_.*_windows_amd64\\.tar\\.gz$"
    asset_type:
      # Binaries (toxiproxy-server[.exe], toxiproxy-cli[.exe]) sit at archive
      # root alongside CHANGELOG/LICENSE/README — no wrapper dir.
      type: archive
      strip_components: 0
  - name: client
    assets:
      linux/amd64:
        - "^toxiproxy-cli-linux-amd64$"
      linux/arm64:
        - "^toxiproxy-cli-linux-arm64$"
      darwin/amd64:
        - "^toxiproxy-cli-darwin-amd64$"
      darwin/arm64:
        - "^toxiproxy-cli-darwin-arm64$"
      windows/amd64:
        - "^toxiproxy-cli-windows-amd64\\.exe$"
    asset_type:
      # Raw binary renamed to toxiproxy-cli (.exe appended on Windows).
      type: binary
      name: toxiproxy-cli
  - name: server
    assets:
      linux/amd64:
        - "^toxiproxy-server-linux-amd64$"
      linux/arm64:
        - "^toxiproxy-server-linux-arm64$"
      darwin/amd64:
        - "^toxiproxy-server-darwin-amd64$"
      darwin/arm64:
        - "^toxiproxy-server-darwin-arm64$"
      windows/amd64:
        - "^toxiproxy-server-windows-amd64\\.exe$"
    asset_type:
      # Raw binary renamed to toxiproxy-server (.exe appended on Windows).
      type: binary
      name: toxiproxy-server

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  min: "2.12.0"
  new_per_run: 5
  poll_interval: "0 */6 * * *"

verify:
  github_asset_digest: true

concurrency:
  max_downloads: 8
  max_bundles: 4
  max_pushes: 2
  rate_limit_ms: 100
  max_retries: 3
  compression_threads: 0

tests:
  - name: smoke
    script: tests/smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm
  darwin/amd64:
    # Intel slice tested on the arm64 macos-14 runner via Rosetta 2 (GitHub's
    # macos-13 Intel pool is exhausted and deadlocks the push job).
    runner: macos-14
  darwin/arm64:
    runner: macos-14
    shell: bash
  windows/amd64:
    runner: windows-latest
    shell: pwsh

notify:
  discord:
    webhook_secret: OCX_MIRROR_DISCORD_HOOK
    user_id: "227748867204972545"  # pinged in-message on failures
